name: Staging

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build STAC Catalog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write    # required for actions/upload-artifact
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: |
          uv pip install --system -e .

      - name: Build STAC Catalog
        run: |
          gen-stac --output public_releases

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stac-catalog
          path: public_releases

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write      # required for OIDC token exchange with AWS
      actions: read        # required for actions/download-artifact
      pull-requests: write # for posting staging preview PR comments
    environment:
      name: staging
      url: https://staging.overturemaps.org/${{ github.event.repository.name }}/pr/${{ github.event.number }}/catalog.json

    steps:
      - name: Configure AWS credentials 🔐
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::763944545891:role/pages-staging-oidc-overturemaps
          aws-region: us-west-2

      - name: Download artifacts 📥
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stac-catalog

      - name: Copy to S3
        run: |
          aws s3 sync --delete . s3://overture-managed-staging-usw2/gh-pages/${GITHUB_EVENT_REPOSITORY_NAME}/pr/${GITHUB_EVENT_NUMBER}/
        env:
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
          GITHUB_EVENT_NUMBER: ${{ github.event.number }}

      - name: Bust the Cache
        run: aws cloudfront create-invalidation --distribution-id E1KP2IN0H2RGGT --paths "/${GITHUB_EVENT_REPOSITORY_NAME}/pr/${GITHUB_EVENT_NUMBER}/*"
        env:
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
          GITHUB_EVENT_NUMBER: ${{ github.event.number }}

      - name: Gather metadata for PR comment
        id: deploy-metadata
        run: |
          echo "time=$(date -u +'%b %d, %Y %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "short-sha=${PR_HEAD_SHA:0:7}" >> $GITHUB_OUTPUT
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          message: |
            ## 🗺️ OMF STAC preview is live!

            |                |                                                                           |
            |----------------|---------------------------------------------------------------------------|
            | 📦 **Catalog** | https://staging.overturemaps.org/${{ github.event.repository.name }}/pr/${{ github.event.number }}/catalog.json |
            | 🕐 **Updated** | ${{ steps.deploy-metadata.outputs.time }}                                 |
            | 📝 **Commit**  | [${{ steps.deploy-metadata.outputs.short-sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }}) |

            > [!NOTE]
            > ♻️ This preview updates automatically with each push to this PR.
